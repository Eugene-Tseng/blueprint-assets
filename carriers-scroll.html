<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;600&family=Source+Sans+3:wght@400&display=swap');
  :root{
    --slab: 'Roboto Slab', Georgia, serif;
    --sans: 'Source Sans 3', system-ui, sans-serif;
    --name: #444444;
    --blue: #0075BC;
    --gray: #5D5D5D;
    --badge-bg: #F2F7FC;
    --divider: #D1D1D1;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:transparent; overflow:hidden; }

  /* OUTER: 1x footprint, this is what scrolls */
  #scroll{
    height:100%; overflow-y:auto; overflow-x:hidden;
    scrollbar-width: thin; scrollbar-color:#C7CED6 transparent;
  }
  #scroll::-webkit-scrollbar{ width:6px; }
  #scroll::-webkit-scrollbar-thumb{ background:#C7CED6; border-radius:3px; }

  /* SIZER: holds the real 1x height; JS sets its height */
  #sizer{ position:relative; width:1170px; }

  /* STAGE: everything is drawn at 2x, then scaled to half = crisp on upscale */
  #stage{ position:absolute; top:0; left:0; width:2340px; transform:scale(.5); transform-origin:top left; }

  #grid{ display:flex; flex-wrap:wrap; gap:32px; width:2340px; opacity:0; transition:opacity .4s ease; }
  #grid.in{ opacity:1; }

  /* All card values are 2x the design spec */
  .card{
    position:relative; flex:none; width:758px; height:348px;
    background:#fff; border-radius:16px;
    box-shadow:0 2px 4px rgba(16,24,40,.06);   /* remove for the SVG's flat look */
  }
  .name{ position:absolute;
    left:32px;
    right:136px;              /* reserve space for the badge */
    top:26px;
    font-family:var(--slab);
    font-weight:500;
    font-size:40px;
    line-height:1.08;
    color:var(--name);
    white-space:normal;
    overflow:hidden;
    display:-webkit-box;
    -webkit-line-clamp:2;     /* allow up to 2 lines */
    -webkit-box-orient:vertical;
    word-break:break-word; }
  .badge{
    position:absolute; right:32px; top:16px; width:74px; height:64px;
    background:var(--badge-bg); border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--slab); font-weight:600; font-size:32px; color:var(--name);
  }
  .ambest{ position:absolute; right:32px; top:88px; font-family:var(--sans); font-weight:400; font-size:32px; line-height:1; color:var(--gray); }
  .fig{ position:absolute; left:32px; top:116px; font-family:var(--slab); font-weight:500; font-size:60px; line-height:1; color:var(--blue); }
  .figlabel{ position:absolute; left:32px; top:194px; font-family:var(--sans); font-weight:400; font-size:28px; line-height:1; letter-spacing:.03em; text-transform:uppercase; color:var(--gray); }
  .divider{ position:absolute; left:32px; right:32px; top:252px; height:2px; background:var(--divider); }
  .global{ position:absolute; left:32px; top:280px; font-family:var(--sans); font-weight:400; font-size:32px; line-height:1; color:var(--gray); }
</style>
</head>
<body>
<div id="scroll"><div id="sizer"><div id="stage"><div id="grid"></div></div></div></div>
<script>
(function () {
  let CARRIERS = [];

  const TAIL = 174;
  const grid = document.getElementById('grid');
  const scroll = document.getElementById('scroll');
  const stage = document.getElementById('stage');
  const sizer = document.getElementById('sizer');

  function card(c) {
    return `
      <div class="card">
        <div class="name">${c.companyName ?? ''}</div>
        <div class="badge">${c.rating ?? ''}</div>
        <div class="ambest">AM Best Rated</div>
        <div class="fig">${c.revenue ?? ''}</div>
        <div class="figlabel">US Industry Premium</div>
        <div class="divider"></div>
        <div class="global">Global Premium: ${c.globalPremium ?? ''}</div>
      </div>
    `;
  }

  function layout() {
    const contentH = stage.offsetHeight * 0.5;
    const overflow = contentH > scroll.clientHeight + 1;
    const runway = overflow ? Math.max(0, scroll.clientHeight - TAIL) : 0;
    sizer.style.height = (contentH + runway) + 'px';
  }

  function render() {
    grid.innerHTML = (CARRIERS || []).map(card).join('');
    requestAnimationFrame(() => {
      grid.classList.add('in');
      layout();
    });
  }

  window.addEventListener("message", (event) => {
    // Optional: validate event.origin for security
    if (event.data && event.data.type === "LOAD_DATA") {
      const data = event.data.payload;
      CARRIERS = data?.page5?.cards || [];
      render();
    }
  });

  window.addEventListener('resize', layout);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(layout);
  }
})();
</script>
</body>
</html>
