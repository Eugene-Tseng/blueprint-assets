<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;600&family=Source+Sans+3:wght@400&display=swap');
  :root{
    --slab: 'Roboto Slab', Georgia, serif;
    --sans: 'Source Sans 3', system-ui, sans-serif;
    --name: #444444;
    --blue: #0075BC;
    --gray: #5D5D5D;
    --badge-bg: #F2F7FC;
    --divider: #D1D1D1;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:transparent; overflow:hidden; }

  /* OUTER: 1x footprint, this is what scrolls */
  #scroll{
    height:100%; overflow-y:auto; overflow-x:hidden;
    scrollbar-width: thin; scrollbar-color:#C7CED6 transparent;
  }
  #scroll::-webkit-scrollbar{ width:6px; }
  #scroll::-webkit-scrollbar-thumb{ background:#C7CED6; border-radius:3px; }

  /* SIZER: holds the real 1x height; JS sets its height */
  #sizer{ position:relative; width:1170px; }

  /* STAGE: everything is drawn at 2x, then scaled to half = crisp on upscale */
  #stage{ position:absolute; top:0; left:0; width:2340px; transform:scale(.5); transform-origin:top left; }

  #grid{ display:flex; flex-wrap:wrap; gap:32px; width:2340px; opacity:0; transition:opacity .4s ease; }
  #grid.in{ opacity:1; }

  /* All card values are 2x the design spec */
  .card{
    position:relative; flex:none; width:758px; height:348px;
    background:#fff; border-radius:16px;
    box-shadow:0 2px 4px rgba(16,24,40,.06);   /* remove for the SVG's flat look */
  }
  .name{ position:absolute; left:32px; top:26px; font-family:var(--slab); font-weight:500; font-size:40px; line-height:1; color:var(--name); }
  .badge{
    position:absolute; right:32px; top:16px; width:74px; height:64px;
    background:var(--badge-bg); border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--slab); font-weight:600; font-size:32px; color:var(--name);
  }
  .ambest{ position:absolute; right:32px; top:88px; font-family:var(--sans); font-weight:400; font-size:32px; line-height:1; color:var(--gray); }
  .fig{ position:absolute; left:32px; top:116px; font-family:var(--slab); font-weight:500; font-size:60px; line-height:1; color:var(--blue); }
  .figlabel{ position:absolute; left:32px; top:194px; font-family:var(--sans); font-weight:400; font-size:28px; line-height:1; letter-spacing:.03em; text-transform:uppercase; color:var(--gray); }
  .divider{ position:absolute; left:32px; right:32px; top:252px; height:2px; background:var(--divider); }
  .global{ position:absolute; left:32px; top:280px; font-family:var(--sans); font-weight:400; font-size:32px; line-height:1; color:var(--gray); }
</style>
</head>
<body>
<div id="scroll"><div id="sizer"><div id="stage"><div id="grid"></div></div></div></div>
<script>
(function(){
  // ---- DYNAMIC DATA -----------------------------------------------------
  // Edit this array to change cards. Later this can be fed from a data
  // source: fetch('carriers.json').then(r=>r.json()).then(d=>{CARRIERS=d; render();});
  var CARRIERS = [
    { name: "Lloyd's of London", rating: "A+",  usPremium: "$377M", globalPremium: "$571M" },
    { name: "Chubb Limited",     rating: "A+",  usPremium: "$255M", globalPremium: "$331M" },
    { name: "Travelers Group",   rating: "A++", usPremium: "$192M", globalPremium: "$224M" },
    { name: "AIG",               rating: "A++", usPremium: "$112M", globalPremium: "$168M" },
    { name: "Zurich Financial",  rating: "A+",  usPremium: "$94M",  globalPremium: "$140M" },
    { name: "Fairfax Holdings",  rating: "A+",  usPremium: "$86M",  globalPremium: "$121M" },
    { name: "Liberty Mutual",    rating: "A",   usPremium: "$78M",  globalPremium: "$104M" },
    { name: "The Hartford",      rating: "A+",  usPremium: "$64M",  globalPremium: "$88M"  },
    { name: "CNA Financial",     rating: "A",   usPremium: "$51M",  globalPremium: "$67M"  }
  ];
  // ----------------------------------------------------------------------

  // How much of a row stays visible at the very top when fully scrolled.
  // 174 = one full card row reaches the top. Increase to let the last row
  // settle lower; decrease to push it higher.
  var TAIL = 174;

  var grid  = document.getElementById('grid');
  var scroll= document.getElementById('scroll');
  var stage = document.getElementById('stage');
  var sizer = document.getElementById('sizer');

  function card(c){
    return '<div class="card">' +
      '<div class="name">' + c.name + '</div>' +
      '<div class="badge">' + c.rating + '</div>' +
      '<div class="ambest">AM Best Rated</div>' +
      '<div class="fig">' + c.usPremium + '</div>' +
      '<div class="figlabel">US Industry Premium</div>' +
      '<div class="divider"></div>' +
      '<div class="global">Global Premium: ' + c.globalPremium + '</div>' +
    '</div>';
  }

  function layout(){
    // stage is 2x; its visible footprint is half its height. Add runway so
    // the last row can scroll up to the top of the visible window.
    var runway = Math.max(0, scroll.clientHeight - TAIL);
    sizer.style.height = (stage.offsetHeight * 0.5 + runway) + 'px';
  }

  function render(){
    grid.innerHTML = CARRIERS.map(card).join('');
    requestAnimationFrame(function(){ grid.classList.add('in'); layout(); });
  }

  render();
  window.addEventListener('resize', layout);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(layout);
})();
</script>
</body>
</html>
