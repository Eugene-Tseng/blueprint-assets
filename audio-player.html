<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
<audio id="slide-audio" preload="auto"></audio>
<script>
  var audio = document.getElementById('slide-audio');

  // Read the ?src= param from the URL and set the audio source
  var params = new URLSearchParams(window.location.search);
  var src = params.get('src');
  if (src) {
    audio.src = 'https://eugene-tseng.github.io/blueprint-assets/' + src;
  }

  // Listen for messages from the Ceros SDK script
  window.addEventListener('message', function(e) {
    if (!audio.src) return;
    if (e.data === 'blueprint:audio-play')  { audio.play(); }
    if (e.data === 'blueprint:audio-pause') { audio.pause(); }
    if (e.data === 'blueprint:audio-stop')  { audio.pause(); audio.currentTime = 0; }
    if (e.data === 'blueprint:replay')      { audio.pause(); audio.currentTime = 0; audio.play(); }
  });
</script>
</body>
</html>
