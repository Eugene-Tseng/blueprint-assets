<!DOCTYPE html>
<html>
<head>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
<audio id="slide-audio" preload="auto"></audio>
<script>
  var audio = document.getElementById('slide-audio');
  var params = new URLSearchParams(window.location.search);
  var src = params.get('src');
  var slideNum = parseInt(params.get('slide'), 10);

  if (src) {
    audio.src = 'https://eugene-tseng.github.io/blueprint-assets/' + src;
  }

  // ✅ Play when this iframe becomes visible (Ceros navigates to this slide)
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      audio.currentTime = 0;
      audio.play().catch(function(err) { console.warn('play blocked:', err); });
    }
  });

  // ✅ postMessage handlers for pause/stop from SDK
  window.addEventListener('message', function(e) {
    if (!audio.src) return;

    if (e.data && typeof e.data === 'object') {
      if (e.data.type === 'blueprint:audio-stop' && e.data.slide !== slideNum) {
        audio.pause();
        audio.currentTime = 0;
      }
      if (e.data.type === 'blueprint:audio-pause') {
        audio.pause();
      }
      if (e.data.type === 'blueprint:audio-resume') {
        audio.play().catch(function(err) { console.warn('resume blocked:', err); });
      }
    }

    if (e.data === 'blueprint:replay') {
      audio.pause();
      audio.currentTime = 0;
      audio.play().catch(function(err) { console.warn('replay blocked:', err); });
    }
  });
</script>
</body>
</html>
