reveal.getBoundingClientRect(); // force reflow so the reset takes
reveal.style.transition = 'stroke-dashoffset ' + (DUR/1000) + 's cubic-bezier(.16,.84,.44,1)';
reveal.style.strokeDashoffset = len * (1 - SCORE/100);
var start = null;
function step(ts){
if(!start) start = ts;
var p = Math.min((ts - start) / DUR, 1);
var eased = 1 - Math.pow(1 - p, 3);
num.textContent = Math.round(eased * SCORE);
if(p < 1) requestAnimationFrame(step);
}
requestAnimationFrame(step);
}
// Run on load, and again whenever the parent (Ceros) signals the page is shown.
var pending;
function schedule(){ clearTimeout(pending); pending = setTimeout(play, DELAY); }

 window.addEventListener("message", (event) => {
    // Optional: validate event.origin for security
    if (event.data && event.data.type === "LOAD_DATA") {
      const data = event.data.payload;
      SCORE = data?.score || 0;
     console.log(SCORE);
      schedule();
    }
  });
})();
